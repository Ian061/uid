<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/typography.css">
    <link rel="stylesheet" href="../styles/colors.css">
    <link rel="stylesheet" href="../styles/checkout.css">
    <script src="../script/script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Comfortaa:wght@300&display=swap" rel="stylesheet">
</head>

<body class="main">

<h1 id = "your-order" class = "title font-brown center-text">
    Your Order
</h1>

<h1 id = "page-title" class = "title font-brown center-text">
    Checkout
</h1>

<a href = "/index.html" class="top-left-button">
    <img src="/image 11.png" alt="home">
</a>


<div class = "cart-space">
    <h1 class="line"></h1>  

    <div id = "empty-cart-message">
        <h2 class="subheaders font-brown">Your cart is empty!</h2>
        <a href="menu.html" class = "button headers font-white">
            Add items
        </a>
    </div>

    <div id = "cart-section">
        <ul id ="cart-items" class = "center-text"></ul>
        <a href="menu.html" class = "button headers font-white">
            Add  more items
        </a>
    </div>
    

    <div id ="checkout-form" style = "display: none;">
        
        <input type = "text" placeholder="FULL NAME" class = "input-field"><br>
        <input type = "text" placeholder="EMAIL" class = "input-field">
        <input type = "text" placeholder="DELIVERY ADDRESS" class = "input-field">
        <input type = "text" placeholder="PHONE NUMBER" class = "input-field">

        <div class="confirm-wrapper">
            <button id = "confirmOrder" class = "button headers font-white">
                Confirm Order
            </div>
        </button>
        
    </div>
    <h1 class = "line"></h1>

</div>

<div>
    <h2 class=" subheaders font-brown right-end">
        Subtotal: $<span id = "subtotal">0.00</span>
    </h2>

    <section class = "cart-space">
        <button id = "checkoutBtn" class = "button headers font-white center-text">
            Proceed to Checkout
        </button>
    </section>
</div>

<script src = "../script/script.js" ></script>

<script>
document.addEventListener("DOMContentLoaded", displayCart);
</script>
 

</body>
</html>
