<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/typography.css">
    <link rel="stylesheet" href="../styles/colors.css">
    <link rel="stylesheet" href="../styles/checkout.css">
    <script src="../script/script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chonburi&family=Comfortaa:wght@300&display=swap" rel="stylesheet">
</head>

<body class="main">

<h1 id = "your-order" class = "text-title font-brown center-text">
    Your Order
</h1>

<h1 id = "page-title" class = "text-title font-brown center-text">
    Checkout
</h1>

<a href = "../index.html" class="top-left-button">
    <img src="../image-11.png" alt="home">
</a>


<div class = "cart-space">
    <h1 class="line"></h1>  

    <div id = "empty-cart-message">
        <h2 class="text-subheaders font-brown">Your cart is empty!</h2>
        <a href="menu.html" class = "button text-headers font-white">
            Add items
        </a>
    </div>

    <div id = "cart-section" >
        <ul id ="cart-items" class = "cart-space_spacing"></ul> 
        <a href="menu.html" class = "button text-headers font-white">
            Add more items
        </a>
    </div>
    

    <form id ="checkout-form" style = "display: none;"  >
        <label for="name"> Name: </label>
        <input type = "text" placeholder="Jane Doe" class = "input-field" required>

        <label for="email">Email:</label>
        <input name="email" type = "email" placeholder="jane@email.com" class = "input-field" required>

        <label for = "Delivery Address">Delivery Address:</label>
        <input type = "text" placeholder= "123, Cool Street, Melbourne" class = "input-field" required>

        <label for = "Phone number">Phone Number:</label>
        <input type = "tel" placeholder="0123-456-789" class = "input-field"required>

        <div class="confirm-wrapper">
            <input type = "button" value="Proceed to payment details" id = "confirmOrder" class = "button text-headers font-white" ></input>
        </div>
    </form>

    <form id="payment-info" style="display: none;">

        <label>Name on card:</label>
        <input type="text" placeholder="Jane Doe" class="input-field" required>

        <label>Card Number:</label>
        <input type="text" placeholder="1234 5678 9012 3456" class="input-field" required>

        <label>CVV:</label>
        <input type="number" placeholder="123" class="input-field" required>

        <label>Expiry Date:</label>
        <input type="text" placeholder="MM/YY" class="input-field" required>

        <label>Billing Address:</label>
        <input type="text" placeholder="123, Cool Street, Melbourne" class="input-field" required>

        <label>State:</label>
        <input type="text" placeholder="VIC" class="input-field" required>

        <label>Postcode:</label>
        <input type="number" placeholder="3000" class="input-field" required>

        <div class="confirm-wrapper">
            <input type = "button" value="Confirm Order" id = "paymentButton" class = "button text-headers font-white"></input>
        </div>
    </form>
    <h1 class = "line"></h1>

</div>

<div>
    <h2 class=" text-subheaders font-brown subtotal-text">
        Subtotal: $<span id = "subtotal">0.00</span>
    </h2>

    <section class = "cart-space">
        <button id = "checkoutBtn" class = "button text-headers font-white center-text">
            Proceed to Checkout
        </button>
    </section>
</div>

<script src = "../script/script.js" ></script>

<script>
document.addEventListener("DOMContentLoaded", displayCart);
</script>
 

</body>
</html>
